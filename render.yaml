services:
  - type: web
    name: linkedin-worker
    runtime: docker
    plan: free
    region: ohio
    # No buildCommand or startCommand needed since we use Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: HEADLESS
        value: "true"
      - key: PORT
        value: "10000"
